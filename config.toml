# The URL the site will be built for
base_url = "https://creativeresistanceco.com"

title = "Creative Resistance"
author = "Betsy Craft"
description = "Creative Resistance is a Colorado-based consulting practice focused on public health, community-engaged research, lived expertise leadership, overdose prevention, drug policy, and arts-based systems change."

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

generate_feeds = true
feed_filenames = [ "atom.xml",]
minify_html = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

taxonomies = [
    { name = "tags", feed = true},
]

[extra]
# Remove the leading hashtag from the line below to add the logo back
# logo_image = "images/logo.svg"
social_media_share_image = "/images/01.jpg"
disqus_identifier = ""
google_analytics = ""
twitter_handle = ""

author_image = '/images/avatar.jpg'

navigation = [
    { url = "$BASE_URL", title = "Home" },
    { url = "$BASE_URL/projects", title = "Projects" },
    { url = "$BASE_URL/publications", title = "Publications" },
    { url = "$BASE_URL/speaking", title = "Speaking" },
    { url = "$BASE_URL/posts", title = "Blog" },
    { url = "$BASE_URL/tags", title = "Tags" },
    { url = "$BASE_URL/about", title = "About" },
]
social_icons = [
    { url = "https://www.linkedin.com/in/betsycraft/", icon = "LinkedIn" },
    { url = "https://www.instagram.com/eastfaxhr", icon = "Instagram" },
    { url = "https://www.instagram.com/coloradodpc", icon = "Instagram" },
    { url = "$BASE_URL/atom.xml", icon = "RSS" },
]
date_format = "%d %b %Y"
language_direction = "auto"
keywords = ["Harm Reduction", "drug policy", "Colorado", "peer support", "naloxone", "advocacy"]

[extra.newsletter]
newsletter_title = "Stay in touch"
newsletter_identifier = "buttondown.com/api/emails/embed-subscribe/betsy.codpc"
newsletter_button = "Subscribe"
newsletter_description = "Updates on Harm Reduction work, drug policy in Colorado, and community projects."

[extra.footer]
menu = [
    { url = "$BASE_URL", title = "Home" },
    { url = "$BASE_URL/projects/", title = "Projects" },
    { url = "$BASE_URL/publications/", title = "Publications" },
    { url = "$BASE_URL/speaking/", title = "Speaking" },
    { url = "$BASE_URL/posts/", title = "Blog" },
    { url = "$BASE_URL/about/", title = "About" },
    { url = "/cv/Betsy_Craft_CV.pdf", title = "CV (PDF)" },
]
#copyright = ""


# Home Page
