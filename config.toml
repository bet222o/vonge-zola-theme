description_html = "<strong>Harm Reductionist, community-engaged researcher, and drug policy leader</strong> based in Colorado. I work at the intersection of lived and living expertise, public health, and policy &mdash; partnering with people who use drugs, peer organizers, and coalitions to shift Colorado away from punishment and toward care."
image = "/images/01.jpg"
image_alt = "Betsy Craft"
