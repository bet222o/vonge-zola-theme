# The URL the site will be built for
base_url = "https://betsycraft.com"

title = "Betsy Craft"
author = "Betsy Craft"
description = "Harm Reductionist, community-engaged researcher, and drug policy advocate based in Colorado."

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

generate_feeds = true
feed_filenames = [ "atom.xml",]
minify_html = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

taxonomies = [
    { name = "tags", feed = true},
]

[extra]
logo_image = "images/logo.svg"
social_media_share_image = "/images/01.jpg"
disqus_identifier = ""
google_analytics = ""
twitter_handle = ""

author_image = '/images/avatar.jpg'

navigation = [
    { url = "$BASE_URL", title = "Home" },
    { url = "$BASE_URL/projects", title = "Projects" },
    { url = "$BASE_URL/publications", title = "Publications" },
    { url = "$BASE_URL/speaking", title = "Speaking" },
    { url = "$BASE_URL/posts", title = "Blog" },
    { url = "$BASE_URL/tags", title = "Tags" },
    { url = "$BASE_URL/about", title = "About" },
]
social_icons = [
    { url = "https://www.linkedin.com/in/betsycraft/", icon = "LinkedIn" },
    { url = "https://www.instagram.com/eastfaxhr", icon = "Instagram" },
    { url = "https://www.instagram.com/coloradodpc", icon = "Instagram" },
    { url = "$BASE_URL/atom.xml", icon = "RSS" },
]
date_format = "%d %b %Y"
language_direction = "auto"
keywords = ["Harm Reduction", "drug policy", "Colorado", "peer support", "naloxone", "advocacy"]

[extra.newsletter]
newsletter_title = "Stay in touch"
newsletter_identifier = ""
newsletter_button = "Subscribe"
newsletter_description = "Updates on Harm Reduction work, drug policy in Colorado, and community projects."

[extra.footer]
menu = [
    { url = "$BASE_URL", title = "Home" },
    { url = "$BASE_URL/projects/", title = "Projects" },
    { url = "$BASE_URL/publications/", title = "Publications" },
    { url = "$BASE_URL/speaking/", title = "Speaking" },
    { url = "$BASE_URL/posts/", title = "Blog" },
    { url = "$BASE_URL/about/", title = "About" },
    { url = "/cv/Betsy_Craft_CV.pdf", title = "CV (PDF)" },
]
#copyright = ""


# Home Page
# This is all the content on your home page, below.
[[extra.content_blocks]]
block = "hero"
title = "Hi, I'm Betsy Craft"
description_html = "<strong>Harm Reductionist, community-engaged researcher, and drug policy advocate</strong> based in Colorado. I work at the intersection of lived experience, public health, and policy &mdash; partnering with people who use drugs, peer organizers, and coalitions to shift Colorado away from punishment and toward care."
image = "/images/01.jpg"
image_alt = "Betsy Craft"
cta_button_link = "#contact"
works_button_link = "#projects"
cta_button = "Get in touch"
works_button = "See my work"
[[extra.content_blocks]]
block = "projects-section"
title = "Selected Projects"
description_html = """
    <p>Coalitions, research collaborations, and community storytelling projects
    I&rsquo;ve helped build &mdash; all rooted in liberatory Harm Reduction and
    drug user leadership.</p>"""
link_url = "/projects"
show_projects = true
[[extra.content_blocks]]
block = "blog-section"
title = "From the Blog"
description_html = """
    <p>Field notes from Harm Reduction work, zine launches, advocacy days, and
    community events around Colorado.</p>"""
link_url = "/posts"
show_posts = true
